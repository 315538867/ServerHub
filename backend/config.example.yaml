server:
  port: 9999
  data_dir: /opt/serverhub

security:
  # jwt_secret: 至少 32 字节随机字符串 (推荐 openssl rand -base64 48)
  jwt_secret: "replace-with-random-string-at-least-32-bytes"
  # aes_key: 必须为 64 个十六进制字符 (= 32 字节，用于 AES-256)
  #   生成: openssl rand -hex 32
  aes_key: "replace-with-64-hex-chars-32-bytes-for-aes256"
  allow_register: false
  login_max_attempts: 5
  login_lockout_min: 15

certbot:
  email: "admin@yourdomain.com"
  webroot: /opt/serverhub/acme

nginx:
  conf_dir: /etc/nginx/conf.d
  reload_cmd: "nginx -s reload"
  test_cmd: "nginx -t"

log:
  level: info
  file: /opt/serverhub/logs/serverhub.log
  max_size_mb: 100
  max_days: 30

scheduler:
  metrics_interval_sec: 5
  cert_check_hour: 2
  deploy_log_keep_days: 30
