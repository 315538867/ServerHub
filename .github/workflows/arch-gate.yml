# v2 重构架构门禁(R0 占位)
#
# R0 阶段:占位骨架,跑 go vet + go test
# R1 起:启用 arch-lint 规则(见 arch-lint.yml,R1 创建)
# R2-R5: 加 e2e-smoke job
# R6: 启用 handler-audit + n1lint
# R7: 启用 arch-lint domain-pure 强模式
# R8: GA 总验收

name: arch-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: vet
        run: cd backend && go vet ./...
      - name: test
        run: cd backend && CGO_ENABLED=1 go test -count=1 ./...

  arch-lint:
    name: arch-lint(R1:adapter-isolation 启用)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: adapter-isolation
        run: |
          set -euo pipefail
          echo "[arch-lint] rule: adapter-isolation"
          if [ -d backend/adapters ]; then
            HITS=$(grep -RnE '"github\.com/serverhub/serverhub/adapters/' \
              backend/adapters/ 2>/dev/null \
              | grep -v '_test.go:' || true)
            if [ -n "$HITS" ]; then
              echo "ERROR: adapter cross-import detected:"
              echo "$HITS"
              exit 1
            fi
            echo "  ok (no adapters/ → adapters/ imports)"
          else
            echo "  skipped (backend/adapters/ not yet created — R2)"
          fi
      - name: domain-pure(skip 模式)
        run: |
          echo "[arch-lint] rule: domain-pure (skip until R7)"
          if [ -d backend/domain ]; then
            BAD=$(grep -RnE '"github\.com/serverhub/serverhub/(repo|usecase|adapters|api)' \
              backend/domain/ 2>/dev/null || true)
            if [ -n "$BAD" ]; then
              echo "WARN: domain/ imports downstream package:"
              echo "$BAD"
              echo "  (skip 模式不阻断,R7 转 strict)"
            else
              echo "  ok"
            fi
          fi
      - name: api-no-gorm
        run: |
          echo "[arch-lint] rule: api-no-gorm"
          HITS=$(grep -rn '"gorm\.io/gorm"' \
            backend/api/ 2>/dev/null \
            | grep -v '_test.go:' || true)
          if [ -n "$HITS" ]; then
            echo "ERROR: api/ handler imports gorm.io/gorm:"
            echo "$HITS"
            exit 1
          fi
          echo "  ok (0 gorm imports in api/ handlers)"
      - name: usecase-no-gin
        run: |
          echo "[arch-lint] rule: usecase-no-gin"
          HITS=$(grep -rn '"github\.com/gin-gonic/gin"' \
            backend/usecase/ 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            echo "ERROR: usecase/ imports gin:"
            echo "$HITS"
            exit 1
          fi
          echo "  ok (0 gin imports in usecase/)"
      - name: handler-no-adapter (skip 模式)
        run: |
          echo "[arch-lint] rule: handler-no-adapter (skip: nginx/profile_handler 仍引用 adapter)"
          HITS=$(grep -rn '"github\.com/serverhub/serverhub/adapters/' \
            backend/api/ 2>/dev/null \
            | grep -v '_test.go:' || true)
          if [ -n "$HITS" ]; then
            echo "WARN: handler imports adapter:"
            echo "$HITS"
            echo "  (skip 模式不阻断,R7 收紧)"
          else
            echo "  ok"
          fi

  handler-audit:
    name: handler-audit (R6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: run handler-audit
        run: go -C backend run ./tools/handler-audit

  bench-gate:
    name: 性能退化(R0 占位)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "benchstat gate pending R3+, baseline at baseline/bench-v1.txt"
