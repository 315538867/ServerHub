# v2 重构架构门禁(R0 占位)
#
# R0 阶段:占位骨架,跑 go vet + go test
# R1 起:启用 arch-lint 规则(见 arch-lint.yml,R1 创建)
# R2-R5: 加 e2e-smoke job
# R6: 启用 handler-audit + n1lint
# R7: 启用 arch-lint domain-pure 强模式
# R8: GA 总验收

name: arch-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: vet
        run: cd backend && go vet ./...
      - name: test
        run: cd backend && CGO_ENABLED=1 go test -count=1 ./...

  arch-lint:
    name: arch-lint(R0 占位)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "arch-lint rules pending R1+, see docs/architecture/v2/06-quality-gates.md §3"

  bench-gate:
    name: 性能退化(R0 占位)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "benchstat gate pending R3+, baseline at baseline/bench-v1.txt"
