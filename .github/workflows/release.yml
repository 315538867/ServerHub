name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.archive_suffix }}
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            cc: gcc
            build_tags: ''
            archive_suffix: ''

          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
            cross_pkg: gcc-aarch64-linux-gnu
            build_tags: ''
            archive_suffix: ''

          - os: macos-latest
            goos: darwin
            goarch: arm64
            cc: clang
            build_tags: ''
            archive_suffix: ''

          - os: macos-13
            goos: darwin
            goarch: amd64
            cc: clang
            build_tags: ''
            archive_suffix: ''

          - os: macos-latest
            goos: darwin
            goarch: arm64
            cc: clang
            build_tags: desktop
            archive_suffix: _desktop

          - os: macos-13
            goos: darwin
            goarch: amd64
            cc: clang
            build_tags: desktop
            archive_suffix: _desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: frontend
        run: |
          rm -f package-lock.json
          npm install
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: Install cross-compiler (Linux arm64)
        if: matrix.cross_pkg != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.cross_pkg }}

      - name: Build binary
        working-directory: backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          CC: ${{ matrix.cc }}
        run: |
          TAGS="${{ matrix.build_tags }}"
          if [ -n "$TAGS" ]; then
            go build -tags "$TAGS" -ldflags="-s -w" -o serverhub .
          else
            go build -ldflags="-s -w" -o serverhub .
          fi

      - name: Package release archive
        shell: bash
        run: |
          ARCHIVE="serverhub_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.archive_suffix }}"
          mkdir -p "dist/${ARCHIVE}"
          cp backend/serverhub "dist/${ARCHIVE}/"
          cp backend/config.example.yaml "dist/${ARCHIVE}/"
          cp README.md LICENSE "dist/${ARCHIVE}/"
          cd dist
          tar -czf "${ARCHIVE}.tar.gz" "${ARCHIVE}/"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
