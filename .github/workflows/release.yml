name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            cc: gcc

          - os: ubuntu-22.04
            goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
            cross_pkg: gcc-aarch64-linux-gnu

          - os: macos-13
            goos: darwin
            goarch: amd64
            cc: clang

          - os: macos-latest
            goos: darwin
            goarch: arm64
            cc: clang

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.2.18'

      - name: Build frontend
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Install cross-compiler (Linux arm64)
        if: matrix.cross_pkg != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.cross_pkg }}

      - name: Build binary
        working-directory: backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          CC: ${{ matrix.cc }}
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          go build -trimpath \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o serverhub .

      - name: Package release archive
        shell: bash
        run: |
          ARCHIVE="serverhub_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "dist/${ARCHIVE}"
          cp backend/serverhub "dist/${ARCHIVE}/"
          cp backend/config.example.yaml "dist/${ARCHIVE}/"
          cp README.md LICENSE "dist/${ARCHIVE}/"
          cd dist
          tar -czf "${ARCHIVE}.tar.gz" "${ARCHIVE}/"
          # Emit a sha256 sidecar so downloaders can verify integrity.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"
          else
            shasum -a 256 "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          generate_release_notes: true
