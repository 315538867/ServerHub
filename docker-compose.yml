# Minimal compose for self-hosted ServerHub.
# Image: build locally with `docker build -t serverhub:local .` or `docker
# load` an OCI tarball from a GitHub Release. Repo intentionally publishes no
# images to any registry — pick the distribution channel that fits your env.
#
# First start writes config.yaml under /data; edit it (especially security.*)
# then `docker compose restart serverhub`.

services:
  serverhub:
    image: serverhub:local
    container_name: serverhub
    restart: unless-stopped
    networks:
      - shubnet
    ports:
      - "9999:9999"
    volumes:
      - serverhub-data:/data
    environment:
      SERVERHUB_DATA_DIR: /data
      SERVERHUB_CONFIG: /data/config.yaml
      SERVERHUB_PORT: 9999
    healthcheck:
      test: ["CMD", "/serverhub", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# Custom subnet避开 docker0 默认 172.17/16 与 WireGuard / k8s overlay 常用的 10.0.0.0/8。
# 若 172.30.0.0/24 与你环境冲突，改成任意未占用的私有段即可。
networks:
  shubnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
          gateway: 172.30.0.1

volumes:
  serverhub-data:
